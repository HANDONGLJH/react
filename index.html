<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX 만화 도서 관리</title>
  <link rel="stylesheet" href="my.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1 class="my-4 text-center anime-title">AJAX 만화 도서 목록</h1>
    <div class="mb-4 text-center">
      <button id="getData" class="btn btn-primary">목록 보기</button>
      <button id="addDataForm" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#bookModal">도서 추가</button>
      <button id="searchData" class="btn btn-info">도서 검색</button>
    </div>

    <div id="message" class="alert d-none" role="alert"></div>

    <div id="output" class="list-group"></div>

    <!-- Modals -->
    <div class="modal fade" id="bookModal" tabindex="-1" aria-labelledby="bookModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="bookModalLabel">도서 정보</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="bookForm">
              <input type="hidden" id="bookId">
              <div class="mb-3">
                <label for="bookTitle" class="form-label">도서명</label>
                <input type="text" class="form-control" id="bookTitle" required>
              </div>
              <div class="mb-3">
                <label for="bookAuthor" class="form-label">작가</label>
                <input type="text" class="form-control" id="bookAuthor" required>
              </div>
              <div class="mb-3">
                <label for="bookYear" class="form-label">출판년도</label>
                <input type="number" class="form-control" id="bookYear" required>
              </div>
              <div class="mb-3">
                <label for="bookPublisher" class="form-label">출판사</label>
                <input type="text" class="form-control" id="bookPublisher" required>
              </div>
              <div class="mb-3">
                <label for="bookEpisode" class="form-label">회차 수</label>
                <input type="number" class="form-control" id="bookEpisode" required>
              </div>
              <button type="submit" class="btn btn-primary">저장</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
